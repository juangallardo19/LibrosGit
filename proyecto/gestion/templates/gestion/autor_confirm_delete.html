{% extends 'gestion/base.html' %}

{% block content %}
<h1>Eliminar Autor</h1>
<p>¿Estás seguro de que deseas eliminar a <strong>{{ autor.nombre }}</strong>?</p>
<p class="text-danger">Esta acción también eliminará todos sus libros asociados.</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
    <a href="{% url 'lista_autores' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
