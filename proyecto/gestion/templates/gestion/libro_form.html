{% extends 'gestion/base.html' %}
{% block content %}
<div class="form-box">
    <h1>{% if object %}Editar<span>.</span>{% else %}Nuevo<span>.</span>{% endif %}</h1>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <p class="field-error">{{ field.errors|join:", " }}</p>
            {% endif %}
        </div>
        {% endfor %}
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{% url 'lista_libros' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
