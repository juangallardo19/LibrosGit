{% extends 'gestion/base.html' %}

{% block content %}
<h1>{% if object %}Editar{% else %}Nuevo{% endif %} Libro</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Guardar</button>
    <a href="{% url 'lista_libros' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
